<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upscale | Campaign Intake</title>
    <meta name="description" content="Complete your private artist campaign intake in three quick steps.">
    <meta name="theme-color" content="#f7f6f3">
    <link rel="canonical" href="https://upscalemarketingsolutions.com/trial-campaign-intake">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Upscale Marketing Solutions">
    <meta property="og:url" content="https://upscalemarketingsolutions.com/trial-campaign-intake">
    <meta property="og:title" content="Upscale | Campaign Intake">
    <meta property="og:description" content="Complete your private artist campaign intake in three quick steps.">
    <meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/slot-booking-c28d8.appspot.com/o/A357A8F0-A23B-4CF7-8518-AE926DD045A7%20(1).png?alt=media&token=20a1663c-a215-45b1-9acc-a6e0d3d29f14">
    <meta property="og:image:secure_url" content="https://firebasestorage.googleapis.com/v0/b/slot-booking-c28d8.appspot.com/o/A357A8F0-A23B-4CF7-8518-AE926DD045A7%20(1).png?alt=media&token=20a1663c-a215-45b1-9acc-a6e0d3d29f14">
    <meta property="og:image:alt" content="Upscale Marketing Solutions logo">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Upscale | Campaign Intake">
    <meta name="twitter:description" content="Complete your private artist campaign intake in three quick steps.">
    <meta name="twitter:image" content="https://firebasestorage.googleapis.com/v0/b/slot-booking-c28d8.appspot.com/o/A357A8F0-A23B-4CF7-8518-AE926DD045A7%20(1).png?alt=media&token=20a1663c-a215-45b1-9acc-a6e0d3d29f14">
    <link rel="icon" type="image/png" href="https://firebasestorage.googleapis.com/v0/b/slot-booking-c28d8.appspot.com/o/A357A8F0-A23B-4CF7-8518-AE926DD045A7%20(1).png?alt=media&token=20a1663c-a215-45b1-9acc-a6e0d3d29f14">
    <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/slot-booking-c28d8.appspot.com/o/A357A8F0-A23B-4CF7-8518-AE926DD045A7%20(1).png?alt=media&token=20a1663c-a215-45b1-9acc-a6e0d3d29f14">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/trial-campaign.css">
</head>
<body class="flow-page">
    <main class="flow-shell">
        <header class="flow-header">
            <a href="/" class="brand-lockup brand-crest" aria-label="Upscale Marketing Solutions">
                <span class="brand-mark">
                    <svg viewBox="0 0 14 16" aria-hidden="true">
                        <polygon points="0,0 14,8 0,16"></polygon>
                    </svg>
                </span>
            </a>
        </header>

        <section class="intake-main">
            <div class="intake-card">
                <form id="trialCampaignForm" class="invite-form" novalidate>
                    <div class="step-progress" aria-label="Campaign intake progress">
                        <div class="step-progress-bar">
                            <span id="stepProgressFill" class="step-progress-fill"></span>
                        </div>
                        <div class="step-progress-items">
                            <div class="step-progress-item active" data-step="1">
                                <span class="step-number">01</span>
                                <span class="step-name">Profile</span>
                            </div>
                            <div class="step-progress-item" data-step="2">
                                <span class="step-number">02</span>
                                <span class="step-name">Release</span>
                            </div>
                            <div class="step-progress-item" data-step="3">
                                <span class="step-number">03</span>
                                <span class="step-name">Audience</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-step active" data-step="1">
                        <div class="step-intro">
                            <div class="section-kicker">Step One</div>
                            <h1 class="section-title">Your profile.</h1>
                            <p class="section-copy">Quick details so we can position your campaign.</p>
                        </div>

                        <div class="form-field">
                            <label for="fullName" class="field-label">Artist Name <span class="field-required">*</span></label>
                            <input type="text" id="fullName" name="fullName" class="field-input" placeholder="Stage name or alias" required>
                        </div>

                        <div class="form-field">
                            <label for="genre" class="field-label">Genre <span class="field-required">*</span></label>
                            <div class="select-frame">
                                <select id="genre" name="genre" class="field-input" required>
                                    <option value="">Select your genre</option>
                                    <option value="hip-hop">Hip-Hop / Rap</option>
                                    <option value="rnb-soul">R&B / Soul</option>
                                    <option value="pop">Pop</option>
                                    <option value="electronic">Electronic / Dance</option>
                                    <option value="afrobeats">Afrobeats</option>
                                    <option value="rock">Indie / Rock</option>
                                    <option value="latin">Latin</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="subgenre" class="field-label">Subgenre <span class="field-optional">optional</span></label>
                            <div class="select-frame is-disabled" id="subgenreFrame">
                                <select id="subgenre" name="subgenre" class="field-input" disabled>
                                    <option value="">Choose a genre first</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-step" data-step="2">
                        <div class="step-intro">
                            <div class="section-kicker">Step Two</div>
                            <h1 class="section-title">Your release.</h1>
                            <p class="section-copy">Share the release we should build around.</p>
                        </div>

                        <div class="form-field">
                            <label for="yearsMakingMusic" class="field-label">Years Making Music <span class="field-required">*</span></label>
                            <div class="select-frame">
                                <select id="yearsMakingMusic" name="yearsMakingMusic" class="field-input" required>
                                    <option value="">Select your experience</option>
                                    <option value="Less than 1 year">Less than 1 year</option>
                                    <option value="1-2 years">1-2 years</option>
                                    <option value="3-5 years">3-5 years</option>
                                    <option value="5-10 years">5-10 years</option>
                                    <option value="10+ years">10+ years</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="youtubeLink" class="field-label">YouTube Video Link <span class="field-required">*</span></label>
                            <input type="url" id="youtubeLink" name="youtubeLink" class="field-input" placeholder="youtube.com/watch?v=..." required>
                        </div>

                        <div id="youtubePreview" class="video-preview is-hidden" aria-live="polite">
                            <img id="youtubeThumbnail" class="video-preview-thumb" alt="YouTube video thumbnail preview">
                            <div class="video-preview-copy">
                                <div class="video-preview-title">Selected video</div>
                                <a id="youtubeWatchLink" href="#" target="_blank" rel="noopener noreferrer" class="video-preview-link">Open submitted video</a>
                            </div>
                        </div>
                    </div>

                    <div class="form-step" data-step="3">
                        <div class="step-intro">
                            <div class="section-kicker">Step Three</div>
                            <h1 class="section-title">Your audience.</h1>
                            <p class="section-copy">Tell us who this campaign should reach.</p>
                        </div>

                        <div class="form-field">
                            <label for="targetRegions" class="field-label">Target Cities or Regions <span class="field-optional">optional</span></label>
                            <textarea id="targetRegions" name="targetRegions" class="field-input field-textarea" rows="4" placeholder="Atlanta, New Jersey, Toronto"></textarea>
                        </div>

                        <div class="form-field">
                            <label for="targetAgeGroup" class="field-label">Target Age Group <span class="field-required">*</span></label>
                            <div class="select-frame">
                                <select id="targetAgeGroup" name="targetAgeGroup" class="field-input" required>
                                    <option value="">Select age group</option>
                                    <option value="13-17">13-17</option>
                                    <option value="18-24">18-24</option>
                                    <option value="25-34">25-34</option>
                                    <option value="35-44">35-44</option>
                                    <option value="45+">45+</option>
                                    <option value="No preference">No preference</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div id="formMessage" class="form-message" aria-live="polite"></div>

                    <div class="cta-row">
                        <button type="button" id="backBtn" class="secondary-button is-hidden">Back</button>
                        <button type="button" id="nextBtn" class="primary-button">Continue</button>
                        <button type="submit" id="submitBtn" class="primary-button is-hidden">
                            <span class="submit-btn-label">Submit for Review</span>
                        </button>
                    </div>

                    <p class="micro-note micro-note-left">Three quick steps.</p>
                </form>
            </div>
        </section>
    </main>

    <script type="module" src="js/trial-campaign.js"></script>
</body>
</html>
